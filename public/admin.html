<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard - Sadri Health</title>
  <link rel="icon" href="logo.ico" type="image/x-icon"/>
  <link rel="stylesheet" href="css/style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
  <div class="container">
    <h1>Appointment Dashboard</h1>
    <div id="appointments"></div>
  </div>

  <script>
    // Check login status
if (localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}


    async function loadAppointments() {
      const res = await fetch('https://sadri-server.onrender.com/api/appointments');
      const data = await res.json();
      const container = document.getElementById('appointments');
      container.innerHTML = '';

      if (data.length === 0) {
        container.innerHTML = '<p>No appointments yet.</p>';
        return;
      }

      data.reverse().forEach(app => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h3>${app.name}</h3>
          <p><b>Phone:</b> ${app.phone}</p>
          <p><b>Email:</b> ${app.email}</p>
          <p><b>Service:</b> ${app.service}</p>
          <p><b>Notes:</b> ${app.notes}</p>
          <p><b>Date:</b> ${app.date} ${app.time}</p>
          <p><b>Status:</b> <span style="color: ${app.status === 'approved' ? 'green' : 'orange'}">${app.status}</span></p>
          <button onclick="approve('${app.id}')">Approve</button>
          <button onclick="remove('${app.id}')">Delete</button>
        `;
        container.appendChild(card);
      });
    }

    async function approve(id) {
      await fetch(`https://sadri-server.onrender.com/api/appointments/${id}/approve`, { method: 'PUT' });
      await loadAppointments();
    }

    async function remove(id) {
      await fetch(`https://sadri-server.onrender.com/api/appointments/${id}`, { method: 'DELETE' });
      await loadAppointments();
    }

    loadAppointments();
  </script>
</body>
</html>
